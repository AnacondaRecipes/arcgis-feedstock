{% set name = "arcgis" %}
{% set version = "2.4.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/arcgis-{{ version }}.tar.gz
  sha256: 6664308c3598e34b46bf141d2bb10487f1f7f4e41ca390339d3d3dcacb29d9db
  patches:
    - 0001-pylerc-to-lerc.patch

build:
  skip: true  # [py<310 or py>313]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  build:
    - patch     # [not win]
    - m2-patch  # [win]
  host:
    - python
    - pillow
    - urllib3 >=1.26.1,<3
    - cachetools
    - lxml
    - cryptography
    - pandas >=2.0.0,<2.2.0
    - numpy >=1.21.6,<2
    - matplotlib-base
    - keyring >=23.3.0
    - lerc
    - ujson >=3
    - truststore >=0.7.0  # [py>39]
    - pywin32-on-windows >=223  # [win]
    - pyshp >=2
    - geomet
    - requests >=2.30.0,<2.32.0
    - requests-oauthlib
    - requests-toolbelt
    - pyspnego >=0.8.0
    - requests-kerberos
    - requests-gssapi
    - dask-core >=2023.3.2
    - matplotlib-inline
    - pyarrow >=11.0.0
    - puremagic >=1.15,<2
    - pip
  run:
    - python
    - pillow
    - urllib3 >=1.26.1,<3
    - cachetools
    - lxml
    - cryptography
    - pandas >=2.0.0,<2.2.0
    - numpy >=1.21.6,<2
    - matplotlib-base
    - keyring >=23.3.0
    - lerc
    - ujson >=3
    - truststore >=0.7.0  # [py>39]
    - pywin32-on-windows >=223  # [win]
    - pyshp >=2
    - geomet
    - requests >=2.30.0,<2.32.0
    - requests-oauthlib
    - requests-toolbelt
    - pyspnego >=0.8.0
    - requests-kerberos
    - requests-gssapi
    - dask-core >=2023.3.2
    - matplotlib-inline
    - pyarrow >=11.0.0
    - puremagic >=1.15,<2  # 
# Extra: gp
    - dill

test:
  imports:
    - arcgis
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://developers.arcgis.com/python/
  summary: ArcGIS API for Python
  license: iMatix
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - AddYourGitHubIdHere
